<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRS Ranking & Match History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #FFD700; font-size: 28px; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 30px; max-width: 1200px; width: 100%; justify-content: center; }
        .panel { background: #111; border: 1px solid #222; border-radius: 8px; padding: 15px; flex: 1 1 400px; max-width: 600px; }
        .panel h2 { color: #FFD700; font-size: 18px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #1a1a1a; color: #aaa; padding: 8px; text-align: left; }
        td { padding: 6px 8px; border-bottom: 1px solid #1a1a1a; }
        .gold td:first-child { border-left: 4px solid #FFD700; }
        .black td:first-child { border-left: 4px solid #555; }
        .grey td:first-child { border-left: 4px solid #333; }
        .pos { color: #888; width: 35px; text-align: center; }
        .team { font-weight: 500; cursor: pointer; }
        .team:hover { color: #FFD700; text-decoration: underline; }
        .gold .team { color: #FFD700; }
        .points { text-align: right; font-weight: bold; color: #fff; }
        .change { text-align: center; width: 60px; }
        .change-up { color: #4caf50; }
        .change-down { color: #f44336; }
        .change-same { color: #666; }
        .streak { color: #4caf50; font-size: 11px; margin-left: 6px; }

        .team-matches { background: #1a1a1a; border-left: 3px solid #FFD700; padding: 6px 10px; font-size: 12px; color: #ccc; }
        .team-match-entry { padding: 4px 0; cursor: pointer; display: flex; align-items: center; border-bottom: 1px solid #222; }
        .team-match-entry:hover { color: #FFD700; }
        .team-match-details { background: #0d0d0d; border-left: 2px solid #555; padding: 6px 10px; font-size: 11px; color: #aaa; display: none; gap: 12px; align-items: center; flex-wrap: wrap; }
        .map-score { white-space: nowrap; }
        .map-score .winner { color: #4caf50; font-weight: bold; }
        .map-score .loser { color: #f44336; }

        .match-entry { font-size: 13px; padding: 6px 8px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; }
        .match-entry:hover { background: #1a1a1a; }
        .match-text { flex: 1; display: flex; justify-content: space-between; align-items: center; }
        .match-stage { color: #888; font-size: 11px; }
        .match-details { background: #1a1a1a; border-left: 3px solid #555; padding: 8px 12px; font-size: 12px; color: #ccc; display: none; justify-content: center; align-items: center; gap: 16px; flex-wrap: wrap; }
        .match-details .map-scores { display: flex; gap: 6px; align-items: center; }
        .match-details .format-badge { color: #FFD700; font-weight: bold; font-size: 13px; }
        .match-details .delta { font-size: 13px; }
        .delta-plus { color: #4caf50; }
        .delta-minus { color: #f44336; }

        .updated { color: #666; font-size: 12px; margin-bottom: 10px; text-align: center; }
        .legend { margin-top: 30px; display: flex; gap: 30px; justify-content: center; align-items: center; color: #888; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 20px; height: 20px; border-radius: 3px; }
        .footer { margin-top: 20px; color: #555; font-size: 11px; text-align: center; }

        /* H2H */
        .h2h-panel { max-width: 800px; margin: 20px auto 0; text-align: center; }
        .h2h-panel select, .h2h-panel button { padding: 8px 12px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; margin: 4px; }
        .h2h-panel button { cursor: pointer; }
        .h2h-panel button:hover { background: #2a2a2a; }
        .h2h-result { margin-top: 12px; font-size: 15px; }
        .h2h-list { margin-top: 8px; }
        .h2h-entry { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .h2h-entry:hover { color: #FFD700; }
        .h2h-details { background: #0d0d0d; border-left: 2px solid #555; padding: 6px 10px; font-size: 11px; color: #aaa; display: none; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
    </style>
</head>
<body>
    <h1>Valve Ranking & Match History</h1>
    <p class="subtitle">Live Standings</p>
    <p class="updated" id="updateTime">Загрузка...</p>
    <div class="container">
        <div class="panel">
            <h2>Рейтинг команд</h2>
            <table id="rankingTable">
                <thead><tr><th>#</th><th>Команда</th><th>Очки</th><th class="change">Изм.</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="panel">
            <h2>Последние матчи</h2>
            <div id="matchHistory"></div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background: #FFD700;"></div><span>Direct Invitation to the D'or TI</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #555;"></div><span>Closed Qualifications to the D'or TI</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #333;"></div><span>Didn't Qualify to the D'or TI</span></div>
    </div>

    <!-- Head‑to‑Head -->
    <div class="h2h-panel">
        <h2 style="color:#FFD700;">Head‑to‑Head</h2>
        <select id="h2hTeam1"></select>
        <select id="h2hTeam2"></select>
        <button onclick="showH2H()">Показать личные встречи</button>
        <div id="h2hOutput"></div>
    </div>

    <p class="footer">by DeepSeek and Yasha</p>

    <script>
        let allRatings = {}, allHistory = [];

        async function loadData() {
            try {
                const [r, h, p] = await Promise.all([fetch('vrs_ratings.json'), fetch('match_history.json'), fetch('vrs_previous.json').catch(() => null)]);
                allRatings = await r.json(); allHistory = await h.json();
                let prev = p ? await p.json() : null;
                renderRanking(allRatings, prev);
                renderHistory(allHistory);
                populateH2HTeams();

                // Последний матч — дата и время
                if (allHistory.length > 0) {
                    const lastMatch = allHistory.reduce((a,b) => new Date(a.date) > new Date(b.date) ? a : b);
                    const d = new Date(lastMatch.date);
                    const timeStr = d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
                    document.getElementById('updateTime').textContent = 'Обновлено: ' + timeStr;
                } else {
                    document.getElementById('updateTime').textContent = 'Нет данных';
                }
            } catch(e) { document.getElementById('updateTime').textContent = 'Ошибка загрузки'; }
        }

        function getStreak(team) {
            const matches = allHistory.filter(m => m.team1===team || m.team2===team).sort((a,b) => new Date(b.date) - new Date(a.date));
            let s = 0;
            for (const m of matches) {
                if (m.winner === 0) continue;
                if ((m.winner===1 && m.team1===team) || (m.winner===2 && m.team2===team)) s++;
                else break;
            }
            if (s >= 3) return s + ' match win streak';
            return '';
        }

        function renderRanking(ratings, previous) {
            const sorted = Object.entries(ratings).sort((a,b) => b[1]-a[1]);
            let prevPos = {};
            if(previous) { const ps = Object.entries(previous).sort((a,b) => b[1]-a[1]); ps.forEach(([t,_],i) => prevPos[t]=i+1); }
            const tbody = document.querySelector('#rankingTable tbody');
            tbody.innerHTML = '';
            sorted.forEach(([team, pts], idx) => {
                const pos = idx+1, old = prevPos[team]||pos, diff = old - pos;
                let ch = ''; if(diff>0) ch=`<span class="change-up">▲${diff}</span>`; else if(diff<0) ch=`<span class="change-down">▼${Math.abs(diff)}</span>`; else ch='<span class="change-same">—</span>';
                const row = document.createElement('tr');
                if(pos<=8) row.className='gold'; else if(pos<=24) row.className='black'; else row.className='grey';
                const streakText = getStreak(team);
                const displayTeam = streakText ? `${team} <span class="streak">${streakText}</span>` : team;
                row.innerHTML = `<td class="pos">${pos}</td><td class="team" style="cursor:pointer;" onclick="window._toggleTeam('${team.replace(/'/g, "\\'")}', this.parentElement)">${displayTeam}</td><td class="points">${Math.round(pts)}</td><td class="change">${ch}</td>`;
                tbody.appendChild(row);
            });
        }

        function formatStage(stage) { return stage ? stage.replace(/ \(x[\d.]+\)/, '') : ''; }

        function getTeamMatches(team) { return allHistory.filter(m => m.team1===team || m.team2===team).slice(-10).reverse(); }

        function toggleTeamMatches(team, row) {
            document.querySelectorAll('.team-matches').forEach(el => el.remove());
            const next = row.nextSibling;
            if(next && next.classList && next.classList.contains('team-matches')) { next.remove(); return; }
            const matches = getTeamMatches(team); if(!matches.length) return;
            const tr = document.createElement('tr'); tr.className='team-matches';
            const td = document.createElement('td'); td.colSpan=4;
            matches.forEach(m => {
                const opp = m.team1===team ? m.team2 : m.team1;
                const res = (m.winner===1&&m.team1===team)||(m.winner===2&&m.team2===team) ? 'Win' : m.winner===0 ? 'Tie' : 'Loss';
                const entry = document.createElement('div'); entry.className='team-match-entry';
                entry.textContent = `vs ${opp}: ${res} (${m.score||'?-?'}) — ${formatStage(m.stage||'')}`;
                const det = document.createElement('div'); det.className='team-match-details';
                let h = '';
                if(m.games) m.games.forEach(g => {
                    const t1w = g.winner===1; const k1=g.k1, k2=g.k2;
                    h += `<span class="map-score"><span class="${t1w?'winner':'loser'}">${k1}</span> : <span class="${t1w?'loser':'winner'}">${k2}</span></span> `;
                });
                if(m.format) h += `<span>${m.format}</span>`;
                if(m.deltas){ const d1=m.deltas.team1, d2=m.deltas.team2; h += `<span class="delta"><span class="${d1>0?'delta-plus':'delta-minus'}">${m.team1}: ${d1>0?'+':''}${d1}</span> <span class="${d2>0?'delta-plus':'delta-minus'}">${m.team2}: ${d2>0?'+':''}${d2}</span></span>`; }
                det.innerHTML = h;
                entry.addEventListener('click', (e) => { e.stopPropagation(); det.style.display = det.style.display==='flex'?'none':'flex'; });
                td.appendChild(entry); td.appendChild(det);
            });
            tr.appendChild(td);
            row.parentNode.insertBefore(tr, row.nextSibling);
        }

        window._toggleTeam = function(team, row) { toggleTeamMatches(team, row); };

        function renderHistory(history) {
            const cont = document.getElementById('matchHistory');
            const recent = history.slice(-77).reverse();
            if(!recent.length){ cont.innerHTML='<p style="color:#666;">Нет сыгранных матчей</p>'; return; }
            cont.innerHTML = '';
            recent.forEach(m => {
                const sc = m.score||'?-?', st = formatStage(m.stage||'');
                const div = document.createElement('div'); div.className='match-entry';
                div.innerHTML = `<span class="match-text"><span>${m.team1} ${sc} ${m.team2}</span><span class="match-stage">${st}</span></span>`;
                const det = document.createElement('div'); det.className='match-details';
                let h = '';
                if(m.games) m.games.forEach(g => {
                    const t1w=g.winner===1, k1=g.k1, k2=g.k2;
                    h += `<span class="map-score"><span class="${t1w?'winner':'loser'}">${k1}</span> : <span class="${t1w?'loser':'winner'}">${k2}</span></span> `;
                });
                if(m.format) h += `<span class="format-badge">${m.format}</span>`;
                if(m.deltas){ const d1=m.deltas.team1, d2=m.deltas.team2; h += `<span class="delta"><span class="${d1>0?'delta-plus':'delta-minus'}">${m.team1}: ${d1>0?'+':''}${d1}</span>&nbsp;<span class="${d2>0?'delta-plus':'delta-minus'}">${m.team2}: ${d2>0?'+':''}${d2}</span></span>`; }
                det.innerHTML = h;
                div.addEventListener('click', () => { det.style.display = det.style.display==='flex'?'none':'flex'; });
                cont.appendChild(div); cont.appendChild(det);
            });
        }

        // ===== H2H =====
        function populateH2HTeams() {
            const teams = Object.keys(allRatings).sort((a,b) => a.localeCompare(b));
            const opts = teams.map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('h2hTeam1').innerHTML = opts;
            document.getElementById('h2hTeam2').innerHTML = opts;
        }

        function showH2H() {
            const t1 = document.getElementById('h2hTeam1').value;
            const t2 = document.getElementById('h2hTeam2').value;
            if (!t1 || !t2 || t1===t2) { document.getElementById('h2hOutput').innerHTML = '<p style="color:#f44;">Выберите две разные команды</p>'; return; }

            const matches = allHistory.filter(m => (m.team1===t1&&m.team2===t2) || (m.team1===t2&&m.team2===t1));
            let w1=0, w2=0;
            matches.forEach(m => {
                if ((m.winner===1&&m.team1===t1) || (m.winner===2&&m.team2===t1)) w1++;
                else if ((m.winner===1&&m.team1===t2) || (m.winner===2&&m.team2===t2)) w2++;
            });

            let html = `<div class="h2h-result">${t1} <b style="color:#FFD700;">${w1}</b> — <b style="color:#FFD700;">${w2}</b> ${t2}</div>`;
            html += '<div class="h2h-list">';
            if (matches.length === 0) {
                html += '<p style="color:#666;">Нет сыгранных матчей</p>';
            } else {
                matches.slice(-20).reverse().forEach(m => {
                    const score = m.score||'?-?';
                    const stage = formatStage(m.stage||'');
                    html += `<div class="h2h-entry" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='flex'?'none':'flex'">${m.team1} ${score} ${m.team2} — ${formatStage(m.stage||'')}</div>`;
                    let det = '<div class="h2h-details">';
                    if(m.games) m.games.forEach(g => {
                        det += `<span class="map-score"><span class="${g.winner===1?'winner':'loser'}">${g.k1}</span> : <span class="${g.winner===1?'loser':'winner'}">${g.k2}</span></span> `;
                    });
                    if(m.format) det += `<span>${m.format}</span>`;
                    if(m.deltas) det += `<span class="delta"><span class="${m.deltas.team1>0?'delta-plus':'delta-minus'}">${m.team1}: ${m.deltas.team1>0?'+':''}${m.deltas.team1}</span> <span class="${m.deltas.team2>0?'delta-plus':'delta-minus'}">${m.team2}: ${m.deltas.team2>0?'+':''}${m.deltas.team2}</span></span>`;
                    det += '</div>';
                    html += det;
                });
            }
            html += '</div>';
            document.getElementById('h2hOutput').innerHTML = html;
        }

        loadData(); setInterval(loadData, 60000);
    </script>
</body>
</html>
